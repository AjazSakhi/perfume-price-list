    <title>Aaliya Perfume Price Finder</title>

        :root { 
            --primary: #27ae60; 
            --wa-green: #25D366; 
            --bg: #f0f2f5; 
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            padding: 20px; 
            margin: 0;
        }
        .box { 
            max-width: 450px; 
            margin: 20px auto; 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        h2 { color: #1a1a1a; margin-top: 0; margin-bottom: 20px; text-align: center; }

        /* Search Container to hold the input and the Clear (X) button */
        .search-container { position: relative; width: 100%; margin-bottom: 20px; }

        #search { 
            width: 100%; 
            padding: 15px 45px 15px 15px; /* Extra padding on right for the X button */
            border: 2px solid #eee; 
            border-radius: 10px; 
            font-size: 16px; 
            outline: none; 
            transition: 0.3s;
            box-sizing: border-box; /* FIX: Prevents going outside on the right */
        }
        #search:focus { border-color: var(--primary); }
